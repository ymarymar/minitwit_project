name: Continuous Deployment

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'minitwit-java/**'
      - 'minitwit-svelte/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch --tags
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          LATEST=${LATEST:-v0.0.0}

          MAJOR=$(echo $LATEST | awk -F. '{print substr($1,2)}')
          MINOR=$(echo $LATEST | awk -F. '{print $2}')
          PATCH=$(echo $LATEST | awk -F. '{print $3}')

          COMMIT_MSG=$(git log -1 --pretty=%B)

          if echo "$COMMIT_MSG" | grep -q '#major'; then
            NEW="v$((MAJOR+1)).0.0"
          elif echo "$COMMIT_MSG" | grep -q '#minor'; then
            NEW="v${MAJOR}.$((MINOR+1)).0"
          else
            NEW="v${MAJOR}.${MINOR}.$((PATCH+1))"
          fi

          git tag $NEW
          git push origin $NEW
          echo "new_tag=$NEW" >> $GITHUB_OUTPUT

      - name: Create release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.tag.outputs.new_tag }}',
              name: '${{ steps.tag.outputs.new_tag }}',
              generate_release_notes: true
            })

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Run Java tests
        working-directory: minitwit-java
        run: mvn test

  build:
    needs: [tag, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push minitwit-java
        uses: docker/build-push-action@v6
        with:
          context: minitwit-java
          file: minitwit-java/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/minitwit-java:${{ needs.tag.outputs.new_tag }}
            ${{ secrets.DOCKER_USERNAME }}/minitwit-java:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/minitwit-java:webbuildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/minitwit-java:webbuildcache,mode=max

      - name: Build and push minitwit-svelte
        uses: docker/build-push-action@v6
        with:
          context: minitwit-svelte
          file: minitwit-svelte/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/minitwit-svelte:${{ needs.tag.outputs.new_tag }}
            ${{ secrets.DOCKER_USERNAME }}/minitwit-svelte:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/minitwit-svelte:webbuildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/minitwit-svelte:webbuildcache,mode=max

  deploy:
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify DO token
        env:
          DIGITAL_OCEAN_KEY: ${{ secrets.DO_TOKEN }}
        run: |
          echo "Length: ${#DIGITAL_OCEAN_KEY}"
          curl -s \
            -H "Authorization: Bearer $DIGITAL_OCEAN_KEY" \
            https://api.digitalocean.com/v2/account

      - name: Install Ansible
        run: |
          pip install ansible
          ansible-galaxy collection install community.digitalocean

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Write vault password
        run: |
          echo -n "${{ secrets.VAULT_PASS }}" > infra/ansible/.vault_pass
          chmod 600 infra/ansible/.vault_pass
          if [ ! -s infra/ansible/.vault_pass ]; then
            echo "ERROR: Vault password file is empty - check VAULT_PASS secret"
            exit 1
          fi

      - name: Rolling deploy
        working-directory: infra/ansible
        env:
          DIGITAL_OCEAN_KEY: ${{ secrets.DO_TOKEN }}
        run: ansible-playbook site.yml --tags deploy --vault-password-file=.vault_pass -e version=${{ needs.tag.outputs.new_tag }}

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for rolling update
        run: sleep 30

      - name: Verify deployment
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://zerodt.live/api/latest)
            if [ "$STATUS" = "200" ]; then
              echo "Deployment verified: HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i/10: HTTP $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Verification failed after 10 attempts"
          exit 1
