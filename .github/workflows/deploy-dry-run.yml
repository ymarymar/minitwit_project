name: Deploy Dry Run

on:
  push:
    branches:
      - test/**
  workflow_dispatch:

jobs:
  check-inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible
          ansible-galaxy collection install community.digitalocean

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Write vault password
        run: echo "${{ secrets.VAULT_PASS }}" > infra/ansible/.vault_pass

      - name: Verify inventory resolves
        working-directory: infra/ansible
        env:
          DIGITAL_OCEAN_KEY: ${{ secrets.DO_TOKEN }}
        run: |
          ansible-inventory -i inventory.digitalocean.yml --list
          echo "---"
          ansible-inventory -i inventory.digitalocean.yml --graph

      - name: Verify vault decrypts
        working-directory: infra/ansible
        run: |
          ansible-vault view playbooks/vars/secrets.yml

      - name: Dry run deploy
        working-directory: infra/ansible
        env:
          DIGITAL_OCEAN_KEY: ${{ secrets.DO_TOKEN }}
        run: |
          ansible-playbook site.yml \
            --tags deploy \
            --check \
            -e version=dry-run-test