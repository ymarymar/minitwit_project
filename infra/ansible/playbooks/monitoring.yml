- name: Setup monitoring
  hosts: monitoring
  become: true

  tasks:
    - name: Create mount point
      file:
        path: /mnt/volume-monitoring
        state: directory

    - name: Mount volume
      mount:
        path: /mnt/volume-monitoring
        src: /dev/sda
        fstype: ext4
        opts: discard,defaults,noatime
        state: mounted

    - name: Create monitoring directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /mnt/volume-monitoring/prometheus_data
        - /mnt/volume-monitoring/grafana_data
        - /mnt/volume-monitoring/loki_data

    - name: Set prometheus directory permissions
      file:
        path: /mnt/volume-monitoring/prometheus_data
        owner: 65534
        group: 65534

    - name: Set grafana directory permissions
      file:
        path: /mnt/volume-monitoring/grafana_data
        owner: 472
        group: 472

    - name: Set loki directory permissions
      file:
        path: /mnt/volume-monitoring/loki_data
        owner: 10001
        group: 10001

    - name: Copy monitoring configs
      copy:
        src: ../../../monitoring/
        dest: /monitoring/

    - name: Generate prometheus config
      template:
        src: templates/prometheus.yml.j2
        dest: /monitoring/prometheus.yml

    - name: Copy docker-compose file
      copy:
        src: ../../../docker-compose.monitoring.yml
        dest: /monitoring/docker-compose.yml

    - name: Stop monitoring stack if running
      shell: docker compose down
      args:
        chdir: /monitoring
      ignore_errors: true

    - name: Start monitoring stack
      shell: docker compose up -d
      args:
        chdir: /monitoring
      async: 300
      poll: 10